<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Basic Box</title>
    <style>
      canvas {
          display: block;
          width: 100%;
          height: 100%;
      }
    </style>
</head>

<body>
<script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.179.1/examples/jsm/",
                    "gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.20/+esm",
                    "tw": "https://cs.wellesley.edu/~cs307/threejs/libs/tw-fa25.js",
                    "cs360/": "https://cdn.jsdelivr.net/gh/rsowell/cs-360-lib/"
                }
            }
</script>
<script type="module">
import * as THREE from 'three';
import { TW } from 'tw';
import { createSnowPerson } from 'cs360/town/snowperson.js';

console.log(`Loaded Three.js version ${THREE.REVISION}`);

const scene = new THREE.Scene();
const renderer = new THREE.WebGLRenderer();

TW.clearColor = 0;
TW.mainInit(renderer, scene);

const frosty = createSnowPerson({});
scene.add(frosty);

TW.cameraSetup(renderer,
               scene,
               TW.objectBoundingBox(frosty));

</script>
</body>
</html>
